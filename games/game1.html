<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Game</title>
    <link rel="stylesheet" href="poker-style.css">
</head>
<body>

    <div class="setup-screen" id="setup-screen">
        <h1>Poker Game Setup</h1>
        <div class="host-controls" id="host-controls">
            <button class="action-button" id="start-game-button">Start Game</button>
        </div>
    </div>

    <div class="poker-table hidden" id="poker-table">
        <div class="table-center">
            <div class="pot">
                <span class="pot__label">Pot:</span>
                <span class="pot__value">0</span>
            </div>
            <div class="community-cards">
                <div class="card card--placeholder"></div>
                <div class="card card--placeholder"></div>
                <div class="card card--placeholder"></div>
                <div class="card card--placeholder"></div>
                <div class="card card--placeholder"></div>
            </div>
        </div>

        <!-- Player Seats -->
        <div class="player-seat player-seat--1">
            <div class="player__info">
                <span class="player__name">Player 1</span>
                <span class="player__chips">1000</span>
            </div>
            <div class="player__cards">
                <div class="card card--hole"></div>
                <div class="card card--hole"></div>
            </div>
        </div>
        <div class="player-seat player-seat--2">
            <div class="player__info">
                <span class="player__name">Player 2</span>
                <span class="player__chips">1000</span>
            </div>
            <div class="player__cards">
                <div class="card card--hole"></div>
                <div class="card card--hole"></div>
            </div>
        </div>
        <div class="player-seat player-seat--3">
            <div class="player__info">
                <span class="player__name">Player 3</span>
                <span class="player__chips">1000</span>
            </div>
            <div class="player__cards">
                <div class="card card--hole"></div>
                <div class="card card--hole"></div>
            </div>
        </div>
        <div class="player-seat player-seat--4">
            <div class="player__info">
                <span class="player__name">Player 4</span>
                <span class="player__chips">1000</span>
            </div>
            <div class="player__cards">
                <div class="card card--hole"></div>
                <div class="card card--hole"></div>
            </div>
        </div>
        <div class="player-seat player-seat--5">
            <div class="player__info">
                <span class="player__name">Player 5</span>
                <span class="player__chips">1000</span>
            </div>
            <div class="player__cards">
                <div class="card card--hole"></div>
                <div class="card card--hole"></div>
            </div>
        </div>
        <div class="player-seat player-seat--6">
            <div class="player__info">
                <span class="player__name">Player 6</span>
                <span class="player__chips">1000</span>
            </div>
            <div class="player__cards">
                <div class="card card--hole"></div>
                <div class="card card--hole"></div>
            </div>
        </div>
    </div>

    <div class="actions-container hidden" id="actions-container">
        <button class="action-button" id="fold-button">Fold</button>
        <button class="action-button" id="check-button">Check</button>
        <div class="bet-controls">
            <button class="action-button" id="bet-button">Bet</button>
            <input type="range" id="bet-slider" min="10" max="1000" value="10">
            <span id="bet-amount">10</span>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="poker-client.js"></script>
</body>
</html>
